services:
  user-db:
    image: mongo:7
    container_name: tasty-user-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user_root
      MONGO_INITDB_ROOT_PASSWORD: user-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_user
    ports:
      - '27017:27017'
    volumes:
      - user_data:/data/db
      - ./docker/mongo-init/user-db.js:/docker-entrypoint-initdb.d/01-user-db.js:ro

  order-db:
    image: mongo:7
    container_name: tasty-order-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: order_root
      MONGO_INITDB_ROOT_PASSWORD: order-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_order
    ports:
      - '27020:27017'
    volumes:
      - order_data:/data/db
      - ./docker/mongo-init/order-db.js:/docker-entrypoint-initdb.d/01-order-db.js:ro

  restaurant-db:
    image: mongo:7
    container_name: tasty-restaurant-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: restaurant_root
      MONGO_INITDB_ROOT_PASSWORD: restaurant-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_restaurant
    ports:
      - '27019:27017'
    volumes:
      - restaurant_data:/data/db
      - ./docker/mongo-init/restaurant-db.js:/docker-entrypoint-initdb.d/01-restaurant-db.js:ro

  face-db:
    image: mongo:7
    container_name: tasty-face-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: face_root
      MONGO_INITDB_ROOT_PASSWORD: face-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_face
    ports:
      - '27030:27017'
    volumes:
      - face_data:/data/db
      - ./docker/mongo-init/face-db.js:/docker-entrypoint-initdb.d/01-face-db.js:ro

  notification-db:
    image: mongo:7
    container_name: tasty-notification-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: notification_root
      MONGO_INITDB_ROOT_PASSWORD: notification-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_notification
    ports:
      - '27031:27017'
    volumes:
      - notification_data:/data/db
      - ./docker/mongo-init/notification-db.js:/docker-entrypoint-initdb.d/01-notification-db.js:ro

  payment-db:
    image: mongo:7
    container_name: tasty-payment-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: payment_root
      MONGO_INITDB_ROOT_PASSWORD: payment-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_payment
    ports:
      - '27032:27017'
    volumes:
      - payment_data:/data/db
      - ./docker/mongo-init/payment-db.js:/docker-entrypoint-initdb.d/01-payment-db.js:ro

  redis:
    image: redis:7-alpine
    container_name: tasty-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tasty-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'

  python-embedder:
    build:
      context: ./faceRecognitionService/python-embedder
      dockerfile: Dockerfile
    container_name: tasty-python-embedder
    ports:
      - '8081:8081'

  user-service:
    build:
      context: .
      dockerfile: userService/Dockerfile
    container_name: tasty-user-service
    env_file:
      - ./userService/.env
    environment:
      MONGO_URI: mongodb://tasty_user_app:user-app-pass-dev@user-db:27017/tasty_user?authSource=tasty_user
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      FACE_SERVICE_BASE_URL: http://face-recognition-service:4030
      FACE_SERVICE_GRPC_TARGET: face-recognition-service:50054
      GRPC_PORT: 50051
      EXPOSE_VERIFICATION_CODES: "true"
    depends_on:
      - user-db
      - redis
      - rabbitmq
      - face-recognition-service
    restart: unless-stopped
    ports:
      - '4000:4000'

  restaurant-service:
    build:
      context: .
      dockerfile: restaurantService/Dockerfile
    container_name: tasty-restaurant-service
    env_file:
      - ./restaurantService/.env
    environment:
      MONGO_URI: mongodb://tasty_restaurant_app:restaurant-app-pass-dev@restaurant-db:27017/tasty_restaurant?authSource=tasty_restaurant
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      RABBITMQ_ENABLED: 'true'
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_JWKS_URI: http://user-service:4000/.well-known/jwks.json
      GRPC_PORT: 50053
    depends_on:
      - restaurant-db
      - redis
      - rabbitmq
      - user-service
    restart: unless-stopped
    ports:
      - '4010:4010'

  order-service:
    build:
      context: .
      dockerfile: orderService/Dockerfile
    container_name: tasty-order-service
    env_file:
      - ./orderService/.env
    environment:
      MONGO_URI: mongodb://tasty_order_app:order-app-pass-dev@order-db:27017/tasty_order?authSource=tasty_order
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_JWKS_URI: http://user-service:4000/.well-known/jwks.json
      FACE_SERVICE_BASE_URL: http://face-recognition-service:4030
      FACE_SERVICE_GRPC_TARGET: face-recognition-service:50054
      GRPC_PORT: 50052
    depends_on:
      - order-db
      - rabbitmq
      - user-service
      - face-recognition-service
    restart: unless-stopped
    ports:
      - '4020:4020'

  face-recognition-service:
    build:
      context: .
      dockerfile: faceRecognitionService/Dockerfile
    container_name: tasty-face-recognition-service
    env_file:
      - ./faceRecognitionService/.env
    environment:
      MONGO_URI: mongodb://tasty_face_app:face-app-pass-dev@face-db:27017/tasty_face?authSource=tasty_face
      PYTHON_EMBEDDER_URL: http://python-embedder:8081
      GRPC_PORT: 50054
    depends_on:
      - face-db
      - python-embedder
    ports:
      - '4030:4030'

  notification-service:
    build:
      context: .
      dockerfile: notificationService/Dockerfile
    container_name: tasty-notification-service
    environment:
      NODE_ENV: development
      PORT: 4060
      LOG_LEVEL: info
      MONGO_URI: mongodb://tasty_notification_app:notification-app-pass-dev@notification-db:27017/tasty_notification?authSource=tasty_notification
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
      BODY_LIMIT: 16kb
      TRUST_PROXY: 1
      REQUEST_TIMEOUT_MS: 10000
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE_EVENTS: tasty.domain.events
      RABBITMQ_EXCHANGE_COMMANDS: tasty.domain.commands
      RABBITMQ_PREFETCH: 20
      RABBITMQ_QUEUE_NOTIFICATION_ENFORCEMENT: notification.enforcement.events.q
      ENFORCEMENT_QUEUE_NAME: notification.enforcement.timer.q
      DRIVER_WAIT_TOTAL_SECONDS: 300
      DRIVER_WAIT_WARNING_OFFSET_SECONDS: 180
      PUSH_PROVIDER: noop
      SMS_PROVIDER: noop
      SMS_FROM_PHONE: '+10000000000'
      GRPC_PORT: 50055
      SOCKET_PORT: 4003
    depends_on:
      - notification-db
      - redis
      - rabbitmq
      - order-service
    restart: unless-stopped
    ports:
      - '4060:4060'

  payment-service:
    build:
      context: .
      dockerfile: paymentService/Dockerfile
    container_name: tasty-payment-service
    env_file:
      - ./paymentService/.env
    environment:
      MONGO_URI: mongodb://tasty_payment_app:payment-app-pass-dev@payment-db:27017/tasty_payment?authSource=tasty_payment
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE_EVENTS: tasty.domain.events
      GRPC_PORT: 50056
    depends_on:
      - payment-db
      - rabbitmq
    restart: unless-stopped
    ports:
      - '4050:4050'

  api-gateway:
    build:
      context: .
      dockerfile: apiGateway/Dockerfile
    container_name: tasty-api-gateway
    env_file:
      - ./apiGateway/.env
    environment:
      NOTIFICATION_SOCKET_TARGET: http://notification-service:4003
      USER_HTTP_BASE_URL: http://user-service:4000
      PAYMENT_HTTP_BASE_URL: http://payment-service:4050
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - face-recognition-service
      - notification-service
      - payment-service
    restart: unless-stopped
    ports:
      - '443:443'

volumes:
  user_data:
  order_data:
  restaurant_data:
  face_data:
  notification_data:
  payment_data:
  redis_data:
