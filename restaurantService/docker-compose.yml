services:
  restaurant-menu-service:
    build:
      context: ..
      dockerfile: restaurantService/Dockerfile
    container_name: tasty-restaurant-menu-service
    ports:
      - "4010:4010"
    env_file:
      - .env
    depends_on:
      - restaurant-db
      - redis
    restart: unless-stopped

  restaurant-db:
    image: mongo:7
    container_name: tasty-restaurant-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: restaurant_root
      MONGO_INITDB_ROOT_PASSWORD: restaurant-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_restaurant
    ports:
      - "27019:27017"
    volumes:
      - restaurant_data:/data/db
      - ../docker/mongo-init/restaurant-db.js:/docker-entrypoint-initdb.d/01-restaurant-db.js:ro

  redis:
    image: redis:7-alpine
    container_name: tasty-restaurant-redis
    ports:
      - "6381:6379"

volumes:
  restaurant_data:
