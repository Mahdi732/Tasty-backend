version: '3.9'
services:
  auth-service:
    build:
      context: ..
      dockerfile: userService/Dockerfile
    container_name: tasty-auth-service
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - user-db
      - redis
      - rabbitmq

  user-db:
    image: mongo:7
    container_name: tasty-user-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user_root
      MONGO_INITDB_ROOT_PASSWORD: user-root-pass-dev
      MONGO_INITDB_DATABASE: tasty_user
    ports:
      - "27017:27017"
    volumes:
      - user_data:/data/db
      - ../docker/mongo-init/user-db.js:/docker-entrypoint-initdb.d/01-user-db.js:ro

  redis:
    image: redis:7-alpine
    container_name: tasty-auth-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tasty-auth-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  user_data:
  redis_data:
