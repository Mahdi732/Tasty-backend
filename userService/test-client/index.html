<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasty UserService Test Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>UserService Test Client</h1>

      <section class="card">
        <h2>Connection</h2>
        <label>
          Base URL
          <input id="baseUrl" type="text" value="http://localhost:4000" />
        </label>
      </section>

      <section class="card grid-2">
        <h2>Auth</h2>
        <label>Email <input id="email" type="email" value="qa.user+1@example.com" /></label>
        <label>Password <input id="password" type="password" value="StrongPass!123" /></label>
        <label>Tenant ID <input id="tenantId" type="text" value="restaurant-001" /></label>
        <label>Device ID <input id="deviceId" type="text" value="test-client-web-1" /></label>

        <div class="actions full">
          <button id="registerBtn">Register</button>
          <button id="startVerifyBtn">Start Verification</button>
          <input id="otpCode" type="text" placeholder="OTP code (e.g. 123456)" />
          <button id="verifyBtn">Verify Email</button>
          <button id="loginBtn">Login</button>
          <button id="meBtn">Me</button>
          <button id="refreshBtn">Refresh</button>
          <button id="logoutBtn">Logout</button>
          <button id="logoutAllBtn">Logout All</button>
        </div>
      </section>

      <section class="card grid-2">
        <h2>Sessions</h2>
        <div class="actions full">
          <button id="listSessionsBtn">List Sessions</button>
          <input id="sessionId" type="text" placeholder="Session ID" />
          <button id="revokeSessionBtn">Revoke Session</button>
        </div>
      </section>

      <section class="card">
        <h2>Token State</h2>
        <div class="token-state">
          <p><strong>Access Token:</strong> <span id="accessTokenState">(none)</span></p>
          <p><strong>Refresh Token:</strong> <span id="refreshTokenState">(none)</span></p>
        </div>
        <button id="clearTokensBtn" class="danger">Clear Tokens</button>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
